<body>

    </div>

</header>

<!-- ================= HERO ================= -->
<section id="home" class="text-center py-24 bg-secondary">

<section id="tema" class="py-16">

    <input id="searchInput"
      placeholder="Cari tema..."
      class="w-full border p-3 rounded mb-4">

      class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

<!-- ================= SOSMED ================= -->

  <div class="sosmed-icons">
    <a href="https://instagram.com/malirainvitation.co"><i class="fab fa-instagram"></i></a>

<!-- ================= FOOTER ================= -->

</footer>

<!-- ================= SCRIPT ================= -->
<script>
const baseUrl = "https://webinvit.id";
const phoneNumber = "6281279281358";

let nextPageUrl = baseUrl + "/seller/api/v1/products/websites?limit=50";
let allThemes = [];
let currentCategoryId = null;

// LOAD
async function loadAllThemes() {
  let url = nextPageUrl;

  while (url) {
    const res = await fetch(url);
    const json = await res.json();

    allThemes = allThemes.concat(json.data.data);
    url = json.data.next_page_url;
  }

  renderThemes(allThemes);
}

// RENDER
function renderThemes(data) {
  const container = document.getElementById("themes");
  container.innerHTML = "";

  data.forEach(theme => {
    container.innerHTML += `
      <div class="bg-white rounded shadow">
        <img src="${theme.featured_image}" class="w-full aspect-square object-cover">
        <div class="p-2">
          <h3 class="font-bold">${theme.name}</h3>
          <div class="grid grid-cols-2 gap-2 mt-2">
            <a href="${baseUrl}/preview/${theme.slug}" target="_blank" class="bg-gray-200 text-center rounded p-1">Preview</a>
            <a href="https://wa.me/${phoneNumber}?text=Pesan ${theme.name}" target="_blank" class="bg-purple-600 text-white text-center rounded p-1">Pesan</a>
          </div>
        </div>
      </div>
    `;
  });
}

// SEARCH
document.getElementById("searchInput").addEventListener("input", function () {
  const keyword = this.value.toLowerCase();

  const filtered = allThemes.filter(t =>
    t.name.toLowerCase().includes(keyword)
  );

  renderThemes(filtered);
});

loadAllThemes();
</script>
