<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <title>Malirainvitation.co - Undangan Website Murah</title>

  <meta name="description" content="Buat undangan online digital website cepat & elegan" />

  <link rel="icon" href="favicon.ico" />

  <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="/assets/theme-16.css" />
</head>

<body>

<!-- HEADER -->
<header class="sticky top-0 z-50 bg-white">
  <nav class="max-w-6xl mx-auto px-4 flex justify-between items-center h-16">
    <div class="flex items-center gap-2">
      <img src="/assets/Malirainvitation.co.png" width="40">
      <span class="font-bold">Malirainvitation.co</span>
    </div>

    <a href="https://wa.me/6281279281358"
      class="bg-primary text-white px-4 py-2 rounded">
      Hubungi Kami
    </a>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="text-center py-24 bg-secondary">
  <h1 class="text-5xl font-bold mb-6">
    Undangan Digital Modern
  </h1>
  <p class="mb-8 text-lg">
    Praktis, elegan, dan bisa dibagikan hanya dengan link
  </p>

  <a href="#tema"
    class="bg-primary text-white px-8 py-3 rounded">
    Lihat Tema
  </a>
</section>

<!-- TEMA -->
<section id="tema" class="py-16">
  <div class="max-w-6xl mx-auto px-4">

    <input id="searchInput"
      placeholder="Cari tema..."
      class="w-full border p-3 rounded mb-4">

    <div id="themes"
      class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

    <!-- LOAD MORE -->
    <div class="text-center mt-6">
      <button id="loadMoreBtn"
        class="bg-primary text-white px-6 py-2 rounded">
        Load More
      </button>
    </div>

  </div>
</section>

<!-- SOSMED -->
<section class="sosmed-fix">
  <h2>Follow Sosmed Kami</h2>

  <div class="sosmed-icons">
    <a href="https://instagram.com/malirainvitation.co"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/6281279281358"><i class="fab fa-whatsapp"></i></a>
  </div>
</section>

<!-- FOOTER -->
<footer class="text-center py-6 text-gray-500">
  © Malirainvitation.co
</footer>

<!-- SCRIPT -->
<script>
const baseUrl = "https://webinvit.id";
const phoneNumber = "6281279281358";

let nextPageUrl = baseUrl + "/seller/api/v1/products/websites?limit=12";
let allThemes = [];

// LOAD FIRST
async function loadThemes() {
  const container = document.getElementById("themes");

  container.innerHTML = `
    <div class="col-span-4 text-center py-10 animate-pulse">
      Loading tema...
    </div>
  `;

  try {
    const res = await fetch(nextPageUrl);
    const json = await res.json();

    allThemes = json.data.data;
    nextPageUrl = json.data.next_page_url;

    renderThemes(allThemes, true);

  } catch {
    container.innerHTML = "Gagal load";
  }
}

// LOAD MORE
async function loadMore() {
  if (!nextPageUrl) return;

  const res = await fetch(nextPageUrl);
  const json = await res.json();

  nextPageUrl = json.data.next_page_url;

  renderThemes(json.data.data, false);
}

// RENDER
function renderThemes(data, clear = false) {
  const container = document.getElementById("themes");

  if (clear) container.innerHTML = "";

  data.forEach(theme => {
    const card = document.createElement("div");

    card.innerHTML = `
      <div class="bg-white rounded shadow hover:shadow-lg transition">
        <img loading="lazy" src="${theme.featured_image}" class="w-full aspect-square object-cover">
        <div class="p-2">
          <h3 class="font-bold text-sm">${theme.name}</h3>
          <div class="grid grid-cols-2 gap-2 mt-2 text-xs">
            <a href="${baseUrl}/preview/${theme.slug}" target="_blank" class="bg-gray-200 text-center rounded p-1">Preview</a>
            <a href="https://wa.me/${phoneNumber}?text=Pesan ${theme.name}" target="_blank" class="bg-purple-600 text-white text-center rounded p-1">Pesan</a>
          </div>
        </div>
      </div>
    `;

    container.appendChild(card);
  });
}

// SEARCH
document.getElementById("searchInput").addEventListener("input", function () {
  const keyword = this.value.toLowerCase();

  const filtered = allThemes.filter(t =>
    t.name.toLowerCase().includes(keyword)
  );

  renderThemes(filtered, true);
});

// BUTTON
document.getElementById("loadMoreBtn").addEventListener("click", loadMore);

// INIT
loadThemes();
</script>

<!-- STYLE -->
<style>
.sosmed-fix {
  text-align:center;
  padding:60px;
  background:#f5f5f5;
}

.sosmed-icons {
  display:flex;
  justify-content:center;
  gap:20px;
}

.sosmed-icons a {
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:#eee;
  font-size:20px;
  transition:0.3s;
}

.sosmed-icons a:hover {
  transform:scale(1.2);
}
</style>

</body>
</html>
